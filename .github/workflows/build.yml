name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7665/pdfium-mac-arm64.tgz
            pdfium_lib: lib/libpdfium.dylib
          - platform: windows-latest
            pdfium_url: https://github.com/bblanchon/pdfium-binaries/releases/download/chromium%2F7665/pdfium-win-x64.tgz
            pdfium_lib: bin/pdfium.dll

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm ci

      - name: Download pdfium
        shell: bash
        run: |
          mkdir -p src-tauri/libs/pdfium/lib
          curl -L "${{ matrix.pdfium_url }}" -o pdfium.tgz
          tar xzf pdfium.tgz
          cp ${{ matrix.pdfium_lib }} src-tauri/libs/pdfium/lib/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "PDF Stamper ${{ github.ref_name }}"
          releaseBody: "Download the installer for your platform."
          releaseDraft: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdf-stamper-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
